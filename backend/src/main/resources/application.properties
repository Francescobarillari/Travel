spring.application.name=Travel
spring.devtools.restart.enabled=true

# Keycloak / OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://172.20.10.2:8081/realms/ae-realm}
keycloak.server-url=${KEYCLOAK_SERVER_URL:http://172.20.10.2:8081}
keycloak.realm=${KEYCLOAK_REALM:ae-realm}
keycloak.app-client-id=${KEYCLOAK_APP_CLIENT_ID:ae-client}
keycloak.app-client-secret=${KEYCLOAK_APP_CLIENT_SECRET:travel-dev-secret}
keycloak.admin-client-id=${KEYCLOAK_ADMIN_CLIENT_ID:travel-backend-admin}
keycloak.admin-client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET:travel-backend-admin-secret}
keycloak.default-client-role=${KEYCLOAK_DEFAULT_CLIENT_ROLE:BASIC}

# Configurazione postgres
# Swagger UI: http://localhost:8080/swagger-ui/index.html
spring.datasource.url=jdbc:postgresql://172.20.10.2:5432/my_project_db
spring.datasource.username=myuser
spring.datasource.password=mypassword
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
