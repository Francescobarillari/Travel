spring.application.name=Travel
spring.devtools.restart.enabled=true

# Keycloak / OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://${HOST_IP:localhost}:8081/realms/ae-realm}
keycloak.server-url=${KEYCLOAK_SERVER_URL:http://${HOST_IP:localhost}:8081}
keycloak.realm=ae-realm
keycloak.app-client-id=ae-client
keycloak.app-client-secret=travel-dev-secret
keycloak.admin-client-id=travel-backend-admin
keycloak.admin-client-secret=travel-backend-admin-secret
keycloak.default-client-role=BASIC

# Configurazione postgres
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${HOST_IP:localhost}:5433/my_project_db}
spring.datasource.username=myuser
spring.datasource.password=mypassword
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# File Upload
app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB