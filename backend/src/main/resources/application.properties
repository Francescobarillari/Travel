spring.application.name=Travel
spring.devtools.restart.enabled=true

# Keycloak / OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://${HOST_IP:localhost}:8081/realms/${KEYCLOAK_REALM}}
keycloak.server-url=${KEYCLOAK_SERVER_URL:http://${HOST_IP:localhost}:8081}
keycloak.realm=${KEYCLOAK_REALM}
keycloak.app-client-id=${KEYCLOAK_APP_CLIENT_ID}
keycloak.app-client-secret=${KEYCLOAK_APP_CLIENT_SECRET}
keycloak.admin-client-id=${KEYCLOAK_ADMIN_CLIENT_ID}
keycloak.admin-client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET}
keycloak.default-client-role=${KEYCLOAK_DEFAULT_CLIENT_ROLE}

# Configurazione postgres
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${HOST_IP:localhost}:5433/my_project_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true

# File Upload
app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Security
app.security.trust-proxy=false

# Unsplash API Config
unsplash.access-key=${UNSPLASH_ACCESS_KEY:}

# Stripe API Config
stripe.api.key=${STRIPE_API_KEY:sk_test_4eC39HqLyjWDarjtT1zdp7dc}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_test_secret}