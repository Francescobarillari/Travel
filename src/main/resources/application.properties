spring.application.name=Travel
spring.devtools.restart.enabled=true

jwt.secret=${JWT_SECRET:QuestaEunaChiaveSegretaMoltoLungaPerIlMioProgettoDiViaggi123!}
jwt.expiration=${JWT_EXPIRATION:36000000}

# Keycloak / OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/ae-realm}

# Configurazione postgres
# Swagger UI: http://localhost:8080/swagger-ui/index.html
spring.datasource.url=jdbc:postgresql://localhost:5432/my_project_db
spring.datasource.username=myuser
spring.datasource.password=mypassword
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
