spring.datasource.url=jdbc:h2:mem:travel_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/ae-realm
keycloak.server-url=http://localhost:8081
keycloak.realm=ae-realm
keycloak.app-client-id=ae-client
keycloak.app-client-secret=travel-dev-secret
keycloak.admin-client-id=travel-backend-admin
keycloak.admin-client-secret=travel-backend-admin-secret
keycloak.default-client-role=BASIC
