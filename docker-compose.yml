services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: my_project_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    # 1. Non facciamo più la "build: .", usiamo un'immagine con Java 21 e Maven già pronti
    image: maven:3.9.6-eclipse-temurin-21
    container_name: java_backend
    working_dir: /app
    
    # 2. Il trucco magico: I Volumi
    volumes:
      - ./:/app                   # Collega la tua cartella di VS Code direttamente dentro Docker
      - maven_cache:/root/.m2     # Salva i download di Maven così non li riscarica mai più
    
    # 3. Il comando di avvio per lo sviluppo
    command: mvn spring-boot:run
    
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/my_project_db
      - SPRING_DATASOURCE_USERNAME=myuser
      - SPRING_DATASOURCE_PASSWORD=mypassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

volumes:
  postgres_data:
  maven_cache: # Dichiariamo il volume per la cache di Maven