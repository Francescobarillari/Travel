services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: my_project_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev --import-realm --hostname=http://${HOST_IP:-localhost}:8081 --hostname-backchannel-dynamic=true
    depends_on:
      - db
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/my_project_db
      KC_DB_USERNAME: myuser
      KC_DB_PASSWORD: mypassword
    volumes:
      - ./keycloak/ae-realm-realm.json:/opt/keycloak/data/import/ae-realm-realm.json:ro
    ports:
      - "8081:8080"

  keycloak-config:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak_config
    depends_on:
      - keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_REALM: ae-realm
      KEYCLOAK_BACKEND_ADMIN_CLIENT_ID: travel-backend-admin
    volumes:
      - ./keycloak/configure-realm.sh:/opt/keycloak/configure-realm.sh:ro
    entrypoint: ["/bin/sh", "/opt/keycloak/configure-realm.sh"]

  backend:
    image: maven:3.9.6-eclipse-temurin-21
    container_name: java_backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./in_common:/in_common
      - maven_cache:/root/.m2
      - ./backend/uploads:/app/uploads
    command: >
      sh -c "
        cd /in_common && mvn clean install -DskipTests -q &&
        cd /app && mvn clean spring-boot:run -Dmaven.test.skip=true
      "
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_started
      keycloak:
        condition: service_started
      keycloak-config:
        condition: service_completed_successfully
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - UPLOAD_DIR=/app/uploads
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/my_project_db
      - SPRING_DATASOURCE_USERNAME=myuser
      - SPRING_DATASOURCE_PASSWORD=mypassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - KEYCLOAK_ISSUER_URI=http://${HOST_IP:-localhost}:8081/realms/ae-realm
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8080/realms/ae-realm/protocol/openid-connect/certs
      - KEYCLOAK_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=ae-realm
      - KEYCLOAK_APP_CLIENT_ID=ae-client
      - KEYCLOAK_APP_CLIENT_SECRET=travel-dev-secret
      - KEYCLOAK_ADMIN_CLIENT_ID=travel-backend-admin
      - KEYCLOAK_ADMIN_CLIENT_SECRET=travel-backend-admin-secret
      - KEYCLOAK_DEFAULT_CLIENT_ROLE=BASIC
      - UNSPLASH_ACCESS_KEY=${UNSPLASH_ACCESS_KEY}
      - SPRING_MAIL_HOST=smtp.gmail.com
      - SPRING_MAIL_PORT=587
      - SPRING_MAIL_USERNAME=eaderive@gmail.com
      - SPRING_MAIL_PASSWORD=jpktjwpfqabylofb
      - SPRING_MAIL_AUTH=true
      - SPRING_MAIL_STARTTLS=true

volumes:
  postgres_data:
  maven_cache: